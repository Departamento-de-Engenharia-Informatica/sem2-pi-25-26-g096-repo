<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentScriptType="application/ecmascript" contentStyleType="text/css" height="1200px" preserveAspectRatio="none" style="width:100%;height:100%;" version="1.1" viewBox="0 0 1200 1200" width="1200px" zoomAndPan="magnify">
  <defs>
    <style type="text/css">
      <![CDATA[
        line, polyline, polygon, path, rect, circle {
          fill: none;
          stroke: #000000;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-width: 1;
        }
        text {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 12px;
        }
        .title {
          font-weight: bold;
          font-size: 16px;
        }
        .participant {
          fill: #FFFFCC;
          stroke: #000000;
        }
        .actor {
          fill: #FFFFDD;
          stroke: #000000;
        }
      ]]>
    </style>
  </defs>
  <rect fill="white" height="1200" width="1200" x="0" y="0"/>
  <text x="600" y="30" text-anchor="middle" class="title">US003 - List Institutions - Split Sequence Diagram</text>
  <text x="600" y="60" text-anchor="middle" font-size="14">Note: This is a generated placeholder. For the complete diagram, use PlantUML rendering.</text>
  
  <!-- Actor -->
  <rect x="50" y="100" width="100" height="60" class="actor" rx="5"/>
  <text x="100" y="135" text-anchor="middle">Political Agent</text>
  
  <!-- UI Component -->
  <rect x="250" y="100" width="150" height="60" class="participant" rx="5"/>
  <text x="325" y="135" text-anchor="middle">ListInstitutionUI</text>
  
  <!-- Controller Component -->
  <rect x="550" y="100" width="150" height="60" class="participant" rx="5"/>
  <text x="625" y="135" text-anchor="middle">ListInstitutionController</text>
  
  <!-- Repository Component -->
  <rect x="850" y="100" width="150" height="60" class="participant" rx="5"/>
  <text x="925" y="135" text-anchor="middle">Repositories</text>
  
  <!-- Interaction lines -->
  <line x1="100" y1="160" x2="100" y2="1000" stroke="#000000" stroke-dasharray="5,5"/>
  <line x1="325" y1="160" x2="325" y2="1000" stroke="#000000" stroke-dasharray="5,5"/>
  <line x1="625" y1="160" x2="625" y2="1000" stroke="#000000" stroke-dasharray="5,5"/>
  <line x1="925" y1="160" x2="925" y2="1000" stroke="#000000" stroke-dasharray="5,5"/>
  
  <!-- Message 1 -->
  <line x1="100" y1="200" x2="325" y2="200" stroke="#000000" marker-end="url(#arrowhead)"/>
  <text x="210" y="190" font-size="11">asks to list institutions</text>
  
  <!-- Sequence steps -->
  <text x="60" y="280" font-weight="bold">1. Actor initiates list institutions request</text>
  <text x="60" y="320" font-weight="bold">2. UI requests institution types from Controller</text>
  <text x="60" y="360" font-weight="bold">3. Controller queries Repositories</text>
  <text x="60" y="400" font-weight="bold">4. Repositories retrieves data</text>
  <text x="60" y="440" font-weight="bold">5. Institution types displayed</text>
  <text x="60" y="480" font-weight="bold">6. Actor selects type</text>
  <text x="60" y="520" font-weight="bold">7. UI requests institutions by type</text>
  <text x="60" y="560" font-weight="bold">8. Controller retrieves and sorts institutions</text>
  <text x="60" y="600" font-weight="bold">9. Sorted institutions displayed alphabetically</text>
  
  <text x="60" y="700" font-size="11" font-style="italic">This is a simplified view of the sequence diagram.</text>
  <text x="60" y="730" font-size="11" font-style="italic">For full PlantUML rendering with all details, execute the conversion scripts.</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#000000"/>
    </marker>
  </defs>
</svg>
